<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRLauncher - GitHub Doğrulaması</title>
    <script>
        // Sayfa yüklendiğinde çalışacak
        window.onload = function() {
            // URL'deki "code" parametresini yakala
            const urlParams = new URLSearchParams(window.location.search);
            const authCode = urlParams.get('code');
            const error = urlParams.get('error');

            if (error) {
                document.body.innerHTML = "<h1>Hata: Giriş reddedildi.</h1>";
                return;
            }

            if (authCode) {
                // Ana uygulamaya mesaj gönder
                if (window.opener) {
                    window.opener.postMessage({ type: 'github-auth', code: authCode }, '*');
                }
                // Kullanıcıya bilgi ver
                document.body.innerHTML = "<h1>Giriş başarılı! Pencere kapanıyor...</h1>";
                setTimeout(() => window.close(), 2000); // 2 saniye sonra pencereyi kapat
            } else {
                document.body.innerHTML = "<h1>Hata: Yetki kodu alınamadı.</h1>";
            }
        };
    </script>
</head>
<body>
    <p>Yükleniyor...</p>
</body>
</html>
